  #    gain: "GAIN_4096MV"
  #    filter_alpha: 0.8

  - board_address: 0x49
    pin: "A2" 
    id: "Pressao_Cilindro_Hidrogenio"
    unit: "bar"
    calibration:
      slope: 0.06934759398
      offset: -0.17995748733
    adc:
      gain: "GAIN_4096MV"
      filter_alpha: 0.8



  - board_address: 0x49
    pin: "A3"
    id: "Tensao_Barramento_Auxiliar"
    unit: "V"
    calibration:
      slope: 0.002312645744
      offset: -0.00553237918
    adc:
