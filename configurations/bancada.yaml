# Instrumentation System Configuration
# Version: 1.0
# Application: Bike Battery Monitoring System
# Calibrated: 2024-08-11
# Technician: Field Engineer

metadata:
  version: "1.0"
  calibration_date: "2024-08-11"
  calibrated_by: "Field Engineer"
  notes: |
    Calibrated using Fluke 87V multimeter at 25°C ambient temperature.
    Supply voltage: 12.000V ±0.001V
    All measurements verified with precision current source.

hardware:
  i2c_bus: "/dev/i2c-2"
  i2c_max_retries: 3        # Maximum I2C read retry attempts
  i2c_retry_delay_ms: 1     # Base retry delay (exponential backoff)
  boards:
    - address: 0x48
      description: "Main battery monitoring board"
    - address: 0x49
      description: "Second"

system:
  main_loop_interval_ms: 100    # 10 Hz sampling rate
  data_send_interval_ms: 200    # 5 Hz transmission rate

channels:
  - board_address: 0x48
    pin: "A0"
    id: "Corrente_Bateria_Principal"
    unit: "A"
    calibration:
      slope: 0.002059726118
      offset: -27.06994605
    adc:
      gain: "GAIN_4096MV"
      filter_alpha: 0.8

  - board_address: 0x48
    pin: "A1"
    id: "Corrente_Celula_Hidrogenio"
    unit: "A"
    calibration:
      slope: 0.00207821
      offset: -27.47133057
    adc:
      gain: "GAIN_4096MV"
      filter_alpha: 0.8

  - board_address: 0x48
    pin: "A2" 
    id: "Tensao_Bateria_Principal"
    unit: "V"
    calibration:
      slope: 0.002311586466
      offset: -0.005998582911
    adc:
      gain: "GAIN_4096MV"
      filter_alpha: 0.8

  - board_address: 0x48
    pin: "A3"
    id: "Tensao_Celula_Hidrogenio"
    unit: "V"
    calibration:
      slope: 0.002312645744
      offset: -0.00553237918
    adc:
      gain: "GAIN_4096MV"
      filter_alpha: 0.8

  - board_address: 0x49
    pin: "A0"
    id: "Corrente_Sistema_Auxiliar"
    unit: "A"
    calibration:
      slope: 0.00205918
      offset: -27.32578402
    adc:
      gain: "GAIN_4096MV"
      filter_alpha: 0.8

  - board_address: 0x49
    pin: "A1"
    id: "Corrente_Carregamento_H2"
    unit: "A"
    calibration:
      slope: 0.002023360428
      offset: -26.38273375
    adc:
      gain: "GAIN_4096MV"
      filter_alpha: 0.8

  #- board_address: 0x49
